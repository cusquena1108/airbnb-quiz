<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  font-family: 'M PLUS Rounded 1c', 'Noto Sans JP', sans-serif;
  background: #FFF6EC;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF6EC"/>
      <stop offset="100%" style="stop-color:#FFE8D0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF5C38"/>
      <stop offset="100%" style="stop-color:#FF9500"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 左側デコレーション -->
  <circle cx="80" cy="80" r="120" fill="#FF5C38" opacity="0.06"/>
  <circle cx="1150" cy="580" r="160" fill="#FF9500" opacity="0.06"/>
  <circle cx="1100" cy="100" r="80" fill="#FF5C38" opacity="0.05"/>

  <!-- 左のカラーバー -->
  <rect x="0" y="0" width="12" height="630" fill="url(#accent)"/>

  <!-- アイコンエリア -->
  <text x="100" y="180" font-size="100">🏠</text>

  <!-- メインテキスト -->
  <text x="100" y="290" font-family="M PLUS Rounded 1c, sans-serif" font-size="22" font-weight="700" fill="#FF5C38" letter-spacing="3">民泊ホスト向けクイズゲーム</text>

  <text x="100" y="370" font-family="M PLUS Rounded 1c, sans-serif" font-size="56" font-weight="900" fill="#2A2520">できるホストは</text>
  <text x="100" y="440" font-family="M PLUS Rounded 1c, sans-serif" font-size="56" font-weight="900" fill="#2A2520">知っている</text>
  <text x="520" y="440" font-family="M PLUS Rounded 1c, sans-serif" font-size="56" font-weight="900" fill="#FF5C38">!?</text>

  <!-- サブタイトル -->
  <rect x="100" y="462" width="480" height="56" rx="12" fill="url(#accent)"/>
  <text x="340" y="498" font-family="M PLUS Rounded 1c, sans-serif" font-size="30" font-weight="900" fill="white" text-anchor="middle">東京単価検定</text>

  <!-- 右側バッジ -->
  <rect x="760" y="220" width="340" height="60" rx="16" fill="white" stroke="#F0E4D4" stroke-width="2"/>
  <text x="930" y="258" font-family="M PLUS Rounded 1c, sans-serif" font-size="22" font-weight="700" fill="#2A2520" text-anchor="middle">📍 東京の実際の物件</text>

  <rect x="760" y="300" width="340" height="60" rx="16" fill="white" stroke="#F0E4D4" stroke-width="2"/>
  <text x="930" y="338" font-family="M PLUS Rounded 1c, sans-serif" font-size="22" font-weight="700" fill="#2A2520" text-anchor="middle">📊 稼働率・写真・地図つき</text>

  <rect x="760" y="380" width="340" height="60" rx="16" fill="white" stroke="#F0E4D4" stroke-width="2"/>
  <text x="930" y="418" font-family="M PLUS Rounded 1c, sans-serif" font-size="22" font-weight="700" fill="#2A2520" text-anchor="middle">🎯 全5問・500点満点</text>

  <rect x="760" y="460" width="340" height="60" rx="16" fill="white" stroke="#F0E4D4" stroke-width="2"/>
  <text x="930" y="498" font-family="M PLUS Rounded 1c, sans-serif" font-size="22" font-weight="700" fill="#2A2520" text-anchor="middle">👑 ランク判定あり</text>

  <!-- URL -->
  <text x="100" y="590" font-family="M PLUS Rounded 1c, sans-serif" font-size="18" font-weight="700" fill="#A09080">tokyo-minpakuhost-price-game.netlify.app</text>
</svg>
</body>
</html>
